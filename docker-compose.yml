services:

  backend:
    build:
      context: ../programacion-3-2025-manescaun-Arroz2807/Backend
    ports:
      - "8000:5000"
    volumes:
      - sqlite-data:/app/instance
    environment:
      - DATABASE_URL=sqlite:////app/instance/app.db
      - SECRET_KEY=tu-clave-secreta
      - CORS_ORIGINS=http://localhost:80,http://localhost
      - FLASK_APP=app.py
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ../programacion-3-2025-manescaun-Arroz2807/Frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  sqlite-data:

networks:
  app-network:
    driver: bridge